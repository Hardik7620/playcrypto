  <!-- Detects keyboard via visualViewport and sends height to chatbot iframe via postMessage -->
  <script>
    (function () {
      // Find ALL iframes, including those inside shadow DOM (Flutter's HtmlElementView)
      function findAllIframes(root) {
        var results = [];
        var iframes = root.querySelectorAll('iframe');
        for (var i = 0; i < iframes.length; i++) results.push(iframes[i]);
        var allElements = root.querySelectorAll('*');
        for (var j = 0; j < allElements.length; j++) {
          if (allElements[j].shadowRoot) {
            var nested = findAllIframes(allElements[j].shadowRoot);
            for (var k = 0; k < nested.length; k++) results.push(nested[k]);
          }
        }
        return results;
      }

      var lastKbH = -1;
      var isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      function onViewportChange() {
        var keyboardH = 0;

        if (isiOS) {
          // Calculate keyboard height using the ORIGINAL innerHeight (not overridden)
          var origGetter = window._origInnerHeightGet;
          var fullH = origGetter ? origGetter.call(window) : window.innerHeight;
          var visibleH = window.visualViewport ? window.visualViewport.height : fullH;
          keyboardH = Math.max(0, Math.floor(fullH - visibleH));
        }

        if (keyboardH !== lastKbH) {
          lastKbH = keyboardH;
          // Send keyboard height to ALL iframes (chatbot)
          var iframes = findAllIframes(document);
          for (var i = 0; i < iframes.length; i++) {
            try {
              iframes[i].contentWindow.postMessage({
                type: 'keyboardResize',
                keyboardHeight: keyboardH
              }, '*');
            } catch (e) { }
          }
        }
        // Prevent scroll
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      }
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', onViewportChange);
        window.visualViewport.addEventListener('scroll', onViewportChange);
      }
      window.addEventListener('scroll', function () {
        if (window.scrollY !== 0) window.scrollTo(0, 0);
      }, { passive: false });
    })();
